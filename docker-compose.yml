version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: "postgresql://postgres:postgres@db:5432/knowledge_hub"
    container_name: knowledge-hub-app
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "4000:4000"
    restart: on-failure
    networks:
      - hub-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./logs:/app/logs
  db:
    image: postgres:16-alpine
    container_name: knowledge-hub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: knowledge_hub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - hub-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: knowledge-hub-adminer
    profiles: ["debug"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - hub-net

networks:
  hub-net:
    driver: bridge

volumes:
  pgdata: